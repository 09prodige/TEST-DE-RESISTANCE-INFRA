<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RIG Scanner{% endblock %}</title>
<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="bg-dark text-light">

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-darker border-bottom border-secondary">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <i class="bi bi-shield-exclamation text-danger fs-3"></i>
      <span class="fw-bold">RIG <span class="text-danger">Scanner</span></span>
      <span class="badge bg-secondary text-uppercase ms-2">v{{ version }}</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('index') }}">
            <i class="bi bi-house-door"></i> Dashboard
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="py-4">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<!-- Footer -->
<footer class="mt-auto py-4 bg-darker border-top border-secondary">
  <div class="container text-center text-muted">
    <p class="mb-1">Resistance Infrastructure Gabon — Web Security Scanner</p>
    <p class="mb-0 small">
      <i class="bi bi-exclamation-triangle text-warning"></i>
      For authorized security testing only.
    </p>
  </div>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
