name: CI

on:
  push:
    branches: [main, "devops/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/ --output-format=github
      - run: mypy src/ --ignore-missing-imports || true

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short --junitxml=report.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: report.xml
          retention-days: 7

  security:
    name: Security Audit
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit safety
      - run: bandit -r src/ -ll -q
      - run: safety check -r requirements.txt --short-report
